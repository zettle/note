<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/note/assets/monokai-sublime.css" />
<link rel="stylesheet" href="/note/assets/github-markdown.min.css" />
<link rel="stylesheet" href="/note/assets/style.css" />
<title>Document</title>
</head>
<body>

    <div class="main">
        <article class="markdown-body">
            <h1 id="002-配置国内镜像">002-配置国内镜像</h1>
<ol>
<li>左侧 <code>Manage Jenkins - Manage Plugins - Advanced - Update Site</code></li>
</ol>
<p><img src="./img/image-1.png" alt=""></p>
<p><img src="./img/image-2.png" alt=""></p>
<ol start="2">
<li>前往<a href="https://mirrors.tuna.tsinghua.edu.cn/">清华加速源</a>，搜索jenkins，然后找到<a href="https://mirrors.tuna.tsinghua.edu.cn/jenkins/updates/update-center.json">updata-center.json</a>，复制链接出来</li>
</ol>
<p><img src="./img/qinghua-1.png" alt=""></p>
<p><img src="./img/qinghua-2.png" alt=""></p>
<ol start="3">
<li>将清华源的地址复制到<code>Update Site</code>里面，提交接口，后面jenkins就会从清华源下载插件</li>
</ol>
<p><img src="./img/image-3.png" alt=""></p>

        </article>

        <ul id="md-nav"></ul>
    </div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
$(() => {
    // 做左侧的树状菜单
    const oIdDom = $('article [id]');
    const mdNav = $('#md-nav');
    let liStr = '';
    $.each(oIdDom, (i, idDom) => { 
        const level = idDom.nodeName.slice(-1);
        if (level !== '1') {
            const id$ = $(idDom);
            const classNames = `level-${level}`;
            liStr += `<li class="${classNames}"><a href="#${idDom.id}">${id$.text()}</a></li>`;
        }
    });
    mdNav.html(liStr);

    // 将<a>加个target
    const aDoms = $('a');
    $.each(aDoms, (_,aDom) => {
        if ($(aDom).attr('href').indexOf('#') !== 0) {
            $(aDom).attr('target', '_blank');
        }
    });
});
</script>
</body>
</html>
