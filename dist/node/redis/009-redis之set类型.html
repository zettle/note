<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/note/assets/monokai-sublime.css" />
<link rel="stylesheet" href="/note/assets/github-markdown.min.css" />
<link rel="stylesheet" href="/note/assets/style.css" />
<title>Document</title>
</head>
<body>

    <div class="main">
        <article class="markdown-body">
            <h1 id="008-redis之set类型">008-redis之set类型</h1>
<p>不允许重复元素，无序</p>
<h2 id="1、存储">1、存储</h2>
<p>语法: <code>sadd &lt;key&gt; &lt;value&gt;</code></p>
<pre><code class="language-shell"><span class="hljs-keyword">sadd</span> mySet a 
<span class="hljs-keyword">sadd</span> mySet a <span class="hljs-comment">// 已经存在不能再添加</span>
</code></pre>
<h2 id="2、获取">2、获取</h2>
<p>语法: <code>smembers &lt;key&gt;</code> 获取key的内容</p>
<pre><code class="language-shell"><span class="hljs-attribute">smembers mySet</span>
</code></pre>
<h2 id="3、删除">3、删除</h2>
<p>语法: <code>srem &lt;key&gt; &lt;value&gt;</code> 删除key的value值</p>
<pre><code class="language-shell"><span class="hljs-attribute">srem mySet a</span>
</code></pre>

        </article>

        <ul id="md-nav"></ul>
    </div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
$(() => {
    // 做左侧的树状菜单
    const oIdDom = $('article [id]');
    const mdNav = $('#md-nav');
    let liStr = '';
    $.each(oIdDom, (i, idDom) => { 
        const level = idDom.nodeName.slice(-1);
        if (level !== '1') {
            const id$ = $(idDom);
            const classNames = `level-${level}`;
            liStr += `<li class="${classNames}"><a href="#${idDom.id}">${id$.text()}</a></li>`;
        }
    });
    mdNav.html(liStr);

    // 将<a>加个target
    const aDoms = $('a');
    $.each(aDoms, (_,aDom) => {
        if ($(aDom).attr('href').indexOf('#') > 0) {
            $(aDom).attr('target', '_blank');
        }
    });
});
</script>
</body>
</html>
