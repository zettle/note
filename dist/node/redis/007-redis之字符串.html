<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/note/assets/monokai-sublime.css" />

<link rel="stylesheet" href="/note/assets/style.css" />

<body>

    <div class="main">
        <article class="markdown-body">
            <h1 id="005-redis之字符串">005-redis之字符串</h1>
<h2 id="1、存储">1、存储</h2>
<p>语法: <code>set &lt;key&gt; &lt;value&gt;</code></p>
<pre><code class="language-shell"><span class="hljs-keyword">set</span> <span class="hljs-built_in">name</span> xiaoming
</code></pre>
<p>如果想要设置存储时间，则使用</p>
<pre><code class="language-shell"><span class="hljs-comment"># 设置30s后过期</span>
<span class="hljs-keyword">set</span> <span class="hljs-built_in">name</span> xiaoming EX <span class="hljs-number">30</span>
</code></pre>
<h2 id="2、获取">2、获取</h2>
<p>语法: <code>get &lt;key&gt;</code></p>
<pre><code class="language-shell"><span class="hljs-keyword">get</span> <span class="hljs-built_in">name</span>
</code></pre>
<h2 id="3、删除">3、删除</h2>
<p>语法: <code>del &lt;key&gt;</code></p>
<pre><code class="language-shell">del <span class="hljs-built_in">name</span>
</code></pre>

        </article>

        <ul id="md-nav"></ul>
    </div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
$(() => {
    // 做左侧的树状菜单
    const oIdDom = $('article [id]');
    const mdNav = $('#md-nav');
    let liStr = '';
    $.each(oIdDom, (i, idDom) => { 
        const level = idDom.nodeName.slice(-1);
        if (level !== '1') {
            const id$ = $(idDom);
            const classNames = `level-${level}`;
            liStr += `<li class="${classNames}"><a href="#${idDom.id}">${id$.text()}</a></li>`;
        }
    });
    mdNav.html(liStr);

    // 将<a>加个target
    const aDoms = $('a');
    $.each(aDoms, (_,aDom) => {
        if ($(aDom).attr('href').indexOf('#') !== 0) {
            $(aDom).attr('target', '_blank');
        }
    });
});
</script>
</body>
</html>
