<p>表在mongodb中称为集合</p>
<p>每一条数据在mongodb中称为文档对象</p>
<p>mongodb是非关系型数据库，对于集合、文档无需关心是否存在，可以直接使用。比如说我们想要进入一个叫School的数据库，无需先创建，直接<code>use School</code>就可以进入。</p>
