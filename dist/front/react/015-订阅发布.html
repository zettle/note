        <h1 id="015-订阅发布">015-订阅发布</h1>
<p>react本身没有订阅发布功能，可以借助第3方库来实现，这里介绍一个<a href="https://www.npmjs.com/package/pubsub-js">pubsub-js</a></p>
<p>用法</p>
<pre><code class="language-js"><span class="hljs-comment">// 订阅，接收2个参数，第1个参数是事件名称</span>
const token = <span class="hljs-module-access"><span class="hljs-module"><span class="hljs-identifier">PubSub</span>.</span></span>subscribe(&#x27;yoyo&#x27;,<span class="hljs-function"> (<span class="hljs-params">msg</span>, <span class="hljs-params">data</span>) =&gt;</span> {
    console.log(msg, data);
});

<span class="hljs-comment">// 取消订阅</span>
<span class="hljs-module-access"><span class="hljs-module"><span class="hljs-identifier">PubSub</span>.</span></span>unsubscribe(token);

<span class="hljs-comment">// 发布</span>
<span class="hljs-module-access"><span class="hljs-module"><span class="hljs-identifier">PubSub</span>.</span></span>publish(&#x27;yoyo&#x27;, {name:&#x27;xiaoming&#x27;,age:<span class="hljs-number">23</span>});
</code></pre>

    </article>
