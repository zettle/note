<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/note/assets/monokai-sublime.css" />
<link rel="stylesheet" href="/note/assets/github-markdown.min.css" />
<link rel="stylesheet" href="/note/assets/style.css" />
<title>Document</title>
</head>
<body>

    <div class="main">
        <article class="markdown-body">
            <h1 id="099-散记">099-散记</h1>
<h2 id="1、传递自定义字段给axios">1、传递自定义字段给axios</h2>
<p><code>axios.create(xxx)</code>中<code>xxx</code>传递类型<code>AxiosRequestConfig | undefined</code></p>
<p>如果还想要传递自定义的进去，可以定义一个集成<code>AxiosRequestConfig</code>的接口</p>
<pre><code class="language-js"><span class="hljs-keyword">import</span> {AxiosRequestConfig} <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;axios&#x27;</span>;

<span class="hljs-keyword">interface</span> <span class="hljs-symbol">CreateAxiosOptions</span> <span class="hljs-symbol">extends</span> <span class="hljs-symbol">AxiosRequestConfig</span> {
    prefixUrl?: <span class="hljs-built_in">string</span>;
}

axios(xxx: CreateAxiosOptions); <span class="hljs-comment">// 是允许的</span>
</code></pre>

        </article>

        <ul id="md-nav"></ul>
    </div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
$(() => {
    // 做左侧的树状菜单
    const oIdDom = $('article [id]');
    const mdNav = $('#md-nav');
    let liStr = '';
    $.each(oIdDom, (i, idDom) => { 
        const level = idDom.nodeName.slice(-1);
        if (level !== '1') {
            const id$ = $(idDom);
            const classNames = `level-${level}`;
            liStr += `<li class="${classNames}"><a href="#${idDom.id}">${id$.text()}</a></li>`;
        }
    });
    mdNav.html(liStr);

    // 将<a>加个target
    const aDoms = $('a');
    $.each(aDoms, (_,aDom) => {
        if ($(aDom).attr('href').indexOf('#') !== 0) {
            $(aDom).attr('target', '_blank');
        }
    });
});
</script>
</body>
</html>
