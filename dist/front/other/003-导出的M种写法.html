<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/note/assets/monokai-sublime.css" />
<link rel="stylesheet" href="/note/assets/github-markdown.min.css" />
<link rel="stylesheet" href="/note/assets/style.css" />
<title>Document</title>
</head>
<body>

    <div class="main">
        <article class="markdown-body">
            <h1 id="003-导出的m种写法">003-导出的M种写法</h1>
<h2 id="1、import后立即export">1、import后立即export</h2>
<pre><code class="language-js"><span class="hljs-keyword">export</span> { <span class="hljs-keyword">default</span> <span class="hljs-keyword">as</span> ACustomModal } <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;./Modal.vue&#x27;</span>
</code></pre>
<p>引入<code>Modal.vue</code>后，立即将其导出</p>
<p>相当于下面代码</p>
<pre><code class="language-js"><span class="hljs-keyword">import</span> ACustomModal <span class="hljs-keyword">from</span> <span class="hljs-string">&#x27;./Modal.vue&#x27;</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> ACustomModal
</code></pre>

        </article>

        <ul id="md-nav"></ul>
    </div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
$(() => {
    // 做左侧的树状菜单
    const oIdDom = $('article [id]');
    const mdNav = $('#md-nav');
    let liStr = '';
    $.each(oIdDom, (i, idDom) => { 
        const level = idDom.nodeName.slice(-1);
        if (level !== '1') {
            const id$ = $(idDom);
            const classNames = `level-${level}`;
            liStr += `<li class="${classNames}"><a href="#${idDom.id}">${id$.text()}</a></li>`;
        }
    });
    mdNav.html(liStr);

    // 将<a>加个target
    const aDoms = $('a');
    $.each(aDoms, (_,aDom) => {
        if ($(aDom).attr('href').indexOf('#') !== 0) {
            $(aDom).attr('target', '_blank');
        }
    });
});
</script>
</body>
</html>
